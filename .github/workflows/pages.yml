name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Install wasm-bindgen-cli
        run: |
          WASM_BINDGEN_VERSION=$(cargo metadata --format-version 1 2>/dev/null | \
            python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print([p['version'] for p in pkgs if p['name']=='wasm-bindgen'][0])" 2>/dev/null || echo "0.2.100")
          cargo install wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION" || cargo install wasm-bindgen-cli

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Build WASM (release)
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Generate JS bindings with wasm-bindgen
        run: |
          wasm-bindgen \
            --out-dir ./web \
            --target web \
            --no-typescript \
            target/wasm32-unknown-unknown/release/genesis.wasm

      - name: Optimize WASM (optional)
        continue-on-error: true
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_121/binaryen-version_121-x86_64-linux.tar.gz | tar xz
          ./binaryen-version_121/bin/wasm-opt -Oz -o ./web/genesis_bg.wasm ./web/genesis_bg.wasm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
