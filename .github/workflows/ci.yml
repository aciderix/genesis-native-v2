name: CI — Build & Test

on:
  push:
    branches: [main, feat/cli-headless]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────
  #  Native builds (Linux, Windows, macOS)
  # ─────────────────────────────────────────────────
  build-native:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
            artifact: genesis-linux
          - os: Windows
            runner: windows-latest
            artifact: genesis-windows
          - os: macOS
            runner: macos-latest
            artifact: genesis-macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: matrix.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libvulkan-dev

      - name: Build (release)
        run: cargo build --release

      - name: Run unit tests
        run: cargo test --release

      - name: Headless smoke test
        if: matrix.os == 'Linux'
        run: |
          echo "::group::Headless simulation (500 ticks, seed 42)"
          ./target/release/genesis --headless --ticks 500 --seed 42 --json
          echo "::endgroup::"

      - name: Headless determinism check
        if: matrix.os == 'Linux'
        run: |
          A=$(./target/release/genesis --headless --ticks 200 --seed 42 --json)
          B=$(./target/release/genesis --headless --ticks 200 --seed 42 --json)
          if [ "$A" = "$B" ]; then
            echo "✅ Deterministic: identical outputs for same seed"
          else
            echo "❌ Non-deterministic!" && diff <(echo "$A") <(echo "$B") && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/genesis${{ matrix.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: warn

  # ─────────────────────────────────────────────────
  #  WASM build (Web)
  # ─────────────────────────────────────────────────
  build-wasm:
    name: Build — Web (WASM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Run wasm-bindgen
        run: |
          mkdir -p web-dist
          wasm-bindgen \
            target/wasm32-unknown-unknown/release/genesis.wasm \
            --out-dir web-dist \
            --target web \
            --no-typescript

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-wasm
          path: web-dist/
          if-no-files-found: warn
