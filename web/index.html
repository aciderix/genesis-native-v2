<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Genesis Engine v6.1 — 🧬 Life Simulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
        
        /* Loading screen */
        #loading {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, #0d1117 0%, #010409 100%);
            color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif;
            transition: opacity 0.8s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        
        .logo { font-size: 4rem; margin-bottom: 0.5rem; }
        .title { font-size: 1.8rem; font-weight: 300; letter-spacing: 0.15em; }
        .subtitle { color: #8b949e; font-size: 0.95rem; margin-top: 0.5rem; }
        
        .progress-container {
            margin-top: 2rem; width: 280px; height: 4px;
            background: #21262d; border-radius: 2px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; width: 0%; border-radius: 2px;
            background: linear-gradient(90deg, #58a6ff, #a371f7, #f778ba);
            transition: width 0.3s ease;
        }
        .status { color: #8b949e; font-size: 0.8rem; margin-top: 1rem; }
        
        /* Bevy canvas fills the viewport */
        #bevy-canvas {
            width: 100vw !important;
            height: 100vh !important;
            display: block;
            position: fixed;
            top: 0; left: 0;
            outline: none;
        }
    </style>
</head>
<body>
    <!-- Bevy will render into this canvas -->
    <canvas id="bevy-canvas"></canvas>

    <!-- Loading overlay (on top of canvas) -->
    <div id="loading">
        <div class="logo">🧬</div>
        <div class="title">GENESIS ENGINE</div>
        <div class="subtitle">v6.1 — Emergent Life Simulation</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="status" id="status">Initializing…</div>
    </div>

    <script>
        const progressEl = document.getElementById('progress');
        const statusEl = document.getElementById('status');
        const loadingEl = document.getElementById('loading');

        function setProgress(pct, msg) {
            progressEl.style.width = pct + '%';
            statusEl.textContent = msg;
        }

        function hideLoading() {
            setProgress(100, 'Running! 🧬');
            setTimeout(() => loadingEl.classList.add('hidden'), 400);
        }

        async function run() {
            setProgress(10, 'Downloading WASM (~30 MB)…');
            
            const mod = await import('./genesis.js');
            
            setProgress(60, 'Starting engine…');

            // Bevy on WASM uses JavaScript exceptions for control flow
            // (wasm-bindgen-futures). The init() call will throw an empty
            // Error {} which is NOT a real error — the engine is running fine.
            //
            // We detect success by waiting for the canvas to receive a WebGL
            // context, then hide the loading overlay.
            const canvasCheckInterval = setInterval(() => {
                const canvas = document.getElementById('bevy-canvas');
                if (canvas && (canvas.getContext('webgl2') || canvas.width > 0)) {
                    clearInterval(canvasCheckInterval);
                    hideLoading();
                }
            }, 200);

            // Timeout: hide loading after 8s regardless (engine may be slow to start)
            setTimeout(() => {
                clearInterval(canvasCheckInterval);
                if (!loadingEl.classList.contains('hidden')) {
                    hideLoading();
                }
            }, 8000);

            try {
                await mod.default();
                // If we get here without error, engine started normally
                clearInterval(canvasCheckInterval);
                hideLoading();
            } catch (e) {
                // Bevy/wasm-bindgen throws an empty Error{} as control flow — not a real error
                const msg = e && e.message ? e.message : '';
                if (msg && msg.length > 5 && !msg.includes('Using exceptions')) {
                    // This looks like a genuine error
                    clearInterval(canvasCheckInterval);
                    console.error('Genesis engine error:', e);
                    setProgress(0, '❌ ' + msg);
                } else {
                    console.log('✅ Bevy WASM engine started (control-flow exception is normal)');
                    // Loading screen will be hidden by the canvas check or timeout
                }
            }
        }

        run().catch(err => {
            console.error('Fatal load error:', err);
            setProgress(0, '❌ Failed to load: ' + (err.message || String(err)));
        });
    </script>
</body>
</html>
