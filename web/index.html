<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Genesis Engine v6.1 — 🧬 Life Simulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
        
        /* Loading screen */
        #loading {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, #0d1117 0%, #010409 100%);
            color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif;
            transition: opacity 0.5s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        
        .logo { font-size: 4rem; margin-bottom: 0.5rem; }
        .title { font-size: 1.8rem; font-weight: 300; letter-spacing: 0.15em; }
        .subtitle { color: #8b949e; font-size: 0.95rem; margin-top: 0.5rem; }
        
        .progress-container {
            margin-top: 2rem; width: 280px; height: 4px;
            background: #21262d; border-radius: 2px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; width: 0%; border-radius: 2px;
            background: linear-gradient(90deg, #58a6ff, #a371f7, #f778ba);
            transition: width 0.3s ease;
        }
        .status { color: #8b949e; font-size: 0.8rem; margin-top: 1rem; }
        
        /* Canvas fills the viewport */
        canvas {
            width: 100vw !important;
            height: 100vh !important;
            display: block;
            outline: none;
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading">
        <div class="logo">🧬</div>
        <div class="title">GENESIS ENGINE</div>
        <div class="subtitle">v6.1 — Emergent Life Simulation</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="status" id="status">Initializing…</div>
    </div>

    <script>
        const progress = document.getElementById('progress');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');

        function setProgress(pct, msg) {
            progress.style.width = pct + '%';
            status.textContent = msg;
        }

        async function run() {
            setProgress(10, 'Loading WASM module…');
            
            // Import the JS bindings generated by wasm-bindgen
            const init = await import('./genesis.js');
            
            setProgress(50, 'Initializing engine…');
            await init.default();
            
            setProgress(100, 'Launching simulation…');
            
            // Hide loading screen after a short delay
            setTimeout(() => loading.classList.add('hidden'), 300);
        }

        run().catch(err => {
            setProgress(0, '❌ Error: ' + err.message);
            console.error('Genesis failed to start:', err);
        });
    </script>
</body>
</html>
